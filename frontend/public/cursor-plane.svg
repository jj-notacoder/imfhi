<svg width="64" height="64" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gold-shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCD34D" />
      <stop offset="50%" stop-color="#D97706" />
      <stop offset="100%" stop-color="#92400E" />
    </linearGradient>
    <linearGradient id="gold-light" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFBEB" />
      <stop offset="100%" stop-color="#F59E0B" />
    </linearGradient>
    <filter id="drop-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset dx="2" dy="2" result="offsetBlur"/>
      <feFlood flood-color="rgba(0,0,0,0.3)" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <g transform="rotate(-45, 50, 50)" filter="url(#drop-shadow)">
    <!-- Left Wing (Darker Gold) -->
    <path d="M50 10 L20 80 L50 65 L80 80 L50 10 Z" fill="url(#gold-shine)" stroke="#B45309" stroke-width="1" />
    
    <!-- Central Ridge / Body Highlight -->
    <path d="M50 10 L50 65" stroke="url(#gold-light)" stroke-width="2" stroke-linecap="round" opacity="0.8" />
    
    <!-- Right Wing Highlight (Lighter) -->
    <path d="M50 10 L80 80 L50 65 Z" fill="url(#gold-light)" fill-opacity="0.3" pointer-events="none"/>
  </g>
</svg>
